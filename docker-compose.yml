services:
	db:
		image: postgres:16
		container_name: asag-db
		environment:
			POSTGRES_USER: postgres
			POSTGRES_PASSWORD: postgres
			POSTGRES_DB: asag_db
		ports:
			- "5432:5432"
		volumes:
			- postgres_data:/var/lib/postgresql/data
		healthcheck:
			test: ["CMD-SHELL", "pg_isready -U postgres -d asag_db"]
			interval: 5s
			timeout: 5s
			retries: 20

	nlp_service:
		image: python:3.11-slim
		container_name: asag-nlp
		working_dir: /app
		command: >
			sh -c "
			pip install --no-cache-dir -r requirements.txt &&
			uvicorn app.main:app --host 0.0.0.0 --port 8001
			"
		volumes:
			- ./nlp_service:/app
		ports:
			- "8001:8001"

	backend:
		image: python:3.11-slim
		container_name: asag-backend
		working_dir: /app
		command: >
			sh -c "
			pip install --no-cache-dir -r requirements.txt &&
			alembic upgrade head &&
			uvicorn app.main:app --host 0.0.0.0 --port 8000
			"
		volumes:
			- ./backend:/app
		ports:
			- "8000:8000"
		environment:
			PROJECT_NAME: ASAG Backend API
			API_V1_PREFIX: /api/v1
			ENVIRONMENT: development
			DEBUG: "true"
			LOG_LEVEL: INFO
			REQUEST_LOGGING_ENABLED: "true"
			AUTO_CREATE_TABLES: "false"
			DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/asag_db
			BACKEND_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
			JWT_SECRET_KEY: change_this_in_production
			JWT_ALGORITHM: HS256
			ACCESS_TOKEN_EXPIRE_MINUTES: "120"
			NLP_SERVICE_BASE_URL: http://nlp_service:8001
		depends_on:
			db:
				condition: service_healthy
			nlp_service:
				condition: service_started

	frontend:
		image: node:20
		container_name: asag-frontend
		working_dir: /app
		command: >
			sh -c "
			npm install &&
			npm run dev -- --host 0.0.0.0 --port 5173
			"
		volumes:
			- ./frontend:/app
			- /app/node_modules
		ports:
			- "5173:5173"
		depends_on:
			- backend

volumes:
	postgres_data:
